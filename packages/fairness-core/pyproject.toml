[project]
name = "fairness-core"
version = "0.1.0"
description = "Audited, framework-agnostic fairness metrics & mitigation engine for the EthicLens bias-audit workbench."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Vardh Jain" }]
keywords = ["fairness", "responsible-ai", "bias", "disparate-impact", "fairlearn"]
dependencies = [
    "numpy>=1.26",
    "pandas>=2.1",
    "scikit-learn>=1.4",
]

[project.optional-dependencies]
validation = ["fairlearn>=0.10"]
viz = ["matplotlib>=3.8"]
cli = ["rich>=13.7"]
reporting = ["reportlab>=4.0", "matplotlib>=3.8"]

[project.scripts]
ethiclens-audit = "fairness_core.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fairness_core"]

[tool.hatch.build.targets.sdist]
include = ["src/fairness_core", "README.md"]
