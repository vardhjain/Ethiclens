name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday scan

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (python, javascript)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ["python", "javascript-typescript"]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv pip install --system pip-audit -e "packages/fairness-core"
      - run: pip-audit --strict || true # report, do not block early-stage builds
